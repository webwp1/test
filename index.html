<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Stream Proxy</title>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        .video-js { width: 100% !important; height: 100% !important; }
    </style>
</head>
<body>

    <video-js id="my-video" class="vjs-default-skin vjs-big-play-centered" controls preload="auto">
        </video-js>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script>
        // Adresa tvého streamu
        const streamUrl = "http://188.175.250.66/dash/CH_NOVA_SPORT1_HD.ism/playlist.mpd";
        
        // Veřejná CORS Proxy, která změní HTTP na HTTPS
        const httpsProxy = "https://api.allorigins.win/raw?url=";
        const finalUrl = httpsProxy + encodeURIComponent(streamUrl);

        var player = videojs('my-video', {
            autoplay: true,
            muted: true,
            html5: {
                vhs: { overrideNative: true },
                dash: {
                    setHttpHeaders: {
                        'User-Agent': 'stremujeme.to/9.8 (Linux;Android 14) AndroidXMedia3/1.1.1'
                    }
                }
            }
        });

        player.src({
            src: finalUrl,
            type: 'application/dash+xml'
        });

        player.on('error', function() {
            console.log("Stream stále blokován. Pravděpodobně je nutná vlastní PHP proxy.");
        });
    </script>
</body>
</html>
