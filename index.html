<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        /* Odstraní okraje, aby v Iframe byl jen přehrávač */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        .video-js { width: 100% !important; height: 100% !important; }
    </style>
</head>
<body>

    <video-js id="my-video" class="vjs-default-skin vjs-big-play-centered" controls preload="auto">
        <source src="http://188.175.250.66/dash/CH_NOVA_SPORT1_HD.ism/playlist.mpd" type="application/dash+xml">
    </video-js>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script>
        var player = videojs('my-video', {
            autoplay: true,
            muted: true, // Nutné pro automatický start v Iframe
            html5: {
                dash: {
                    setHttpHeaders: {
                        'User-Agent': 'stremujeme.to/9.8 (Linux;Android 14) AndroidXMedia3/1.1.1'
                    }
                }
            }
        });
    </script>
</body>
</html>
