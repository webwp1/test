<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Bypass Player</title>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        .video-js { width: 100% !important; height: 100% !important; }
    </style>
</head>
<body>

    <video-js id="my-video" class="vjs-default-skin" controls preload="auto"></video-js>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script>
        // Tato proxy se pokusí "převléknout" HTTP na HTTPS tak, aby prohlížeč neprotestoval
        const target = "188.175.250.66/dash/CH_NOVA_SPORT1_HD.ism/playlist.mpd";
        const proxy = "https://corsproxy.io/?" + encodeURIComponent(target);

        var player = videojs('my-video', {
            autoplay: true,
            muted: true,
            html5: {
                vhs: { 
                    overrideNative: true,
                    // Zkusíme vynutit, aby i všechny kousky videa (.m4s) jely přes HTTPS proxy
                    proxyUrl: "https://corsproxy.io/?" 
                },
                dash: {
                    setHttpHeaders: {
                        'User-Agent': 'stremujeme.to/9.8 (Linux;Android 14) AndroidXMedia3/1.1.1'
                    }
                }
            }
        });

        player.src({ src: proxy, type: 'application/dash+xml' });

        player.on('error', function() {
            const err = player.error();
            console.log("Detail chyby:", err.code, err.message);
        });
    </script>
</body>
</html>
