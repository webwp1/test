<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Player</title>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        .video-js { width: 100% !important; height: 100% !important; }
    </style>
</head>
<body>

    <video-js id="my-video" class="vjs-default-skin" controls preload="auto"></video-js>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script>
        // 1. Definujeme zdroj a PROXY, která umí HTTPS
        const rawUrl = "http://188.175.250.66/dash/CH_NOVA_SPORT1_HD.ism/playlist.mpd";
        // Použijeme CORS-Anywhere nebo podobnou proxy, která přepíše i vnitřní cesty
        const proxyPrefix = "https://api.allorigins.win/raw?url=";
        const secureUrl = proxyPrefix + encodeURIComponent(rawUrl);

        var player = videojs('my-video', {
            autoplay: true,
            muted: true,
            fluid: true,
            html5: {
                vhs: {
                    // Tato funkce se pokusí vynutit HTTPS i pro segmenty videa
                    handleManifestRedirects: true,
                    overrideNative: true
                },
                dash: {
                    setHttpHeaders: {
                        'User-Agent': 'stremujeme.to/9.8 (Linux;Android 14) AndroidXMedia3/1.1.1'
                    }
                }
            }
        });

        player.src({
            src: secureUrl,
            type: 'application/dash+xml'
        });

        // Automatický restart při chybě sítě
        player.on('error', function() {
            console.log("Pokus o restart přes náhradní trasu...");
            setTimeout(() => { player.src(secureUrl); }, 2000);
        });
    </script>
</body>
</html>
